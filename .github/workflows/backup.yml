name: Database Backup

on:
  schedule:
    # Daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run database backup
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_NAME: ${{ secrets.DB_NAME || 'pro-fundx' }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BACKUP_RETENTION_DAYS: 30
        run: |
          chmod +x scripts/backup.sh
          mkdir -p backups
          ./scripts/backup.sh backups

      - name: Upload backup to artifact
        uses: actions/upload-artifact@v4
        with:
          name: pro-fundx-db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 7

      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'backup.yml',
              per_page: 10
            });
            for (const run of runs.workflow_runs.slice(1)) {
              const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
              for (const art of artifacts.artifacts) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: art.id
                });
              }
            }
