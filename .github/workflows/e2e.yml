name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fundedpro
          POSTGRES_USER: fundedpro
          POSTGRES_PASSWORD: testpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U fundedpro
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd api && npm ci
          cd .. && npm ci
      - name: Generate Prisma client
        run: cd api && npx prisma generate
      - name: Run migrations
        run: cd api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fundedpro:testpass123@localhost:5432/fundedpro?schema=public
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start API server
        run: |
          cd api && DATABASE_URL="postgresql://fundedpro:testpass123@localhost:5432/fundedpro?schema=public" \
            JWT_SECRET="test_jwt_secret_key_that_is_32_chars_long!" \
            JWT_REFRESH_SECRET="test_refresh_secret_32_chars_long!!" \
            CLIENT_URL="http://localhost:5173" \
            API_URL="http://localhost:3001/api" \
            node dist/index.js &
          sleep 3
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
