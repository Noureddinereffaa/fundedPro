name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Run TypeScript check (API)
        run: npx tsc --noEmit
        working-directory: api

      - name: Run tests
        run: npx vitest run
        working-directory: api

      - name: Install frontend dependencies
        run: npm ci

      - name: Run TypeScript check (Frontend)
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t fundedpro-api ./api

      - name: Build WS image
        run: docker build -t fundedpro-ws -f Dockerfile.ws .

      - name: Build Frontend image
        run: docker build -t fundedpro-frontend -f Dockerfile.frontend .
