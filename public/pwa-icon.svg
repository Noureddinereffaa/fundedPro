<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upward trending arrow -->
    <polyline points="-100,60 -30,-20 30,30 120,-60" stroke-width="28" stroke="#26a69a"/>
    <polyline points="80,-60 120,-60 120,-20" stroke-width="24" stroke="#26a69a"/>
    <!-- Candlestick bars -->
    <rect x="-180" y="-30" width="40" height="120" rx="4" stroke-width="12" stroke="#26a69a" fill="none"/>
    <rect x="-120" y="-70" width="40" height="160" rx="4" stroke-width="12" stroke="#ef5350" fill="none"/>
    <rect x="-60" y="-50" width="40" height="140" rx="4" stroke-width="12" stroke="#26a69a" fill="none"/>
    <rect x="140" y="-80" width="40" height="170" rx="4" stroke-width="12" stroke="#26a69a" fill="none"/>
  </g>
</svg>
