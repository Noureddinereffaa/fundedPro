events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout  65;

    # ── Compression ──────────────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=trading:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=admin:10m   rate=60r/m;

    # ── Upstreams ────────────────────────────────────────────────
    upstream api { server api:3001; }
    upstream ws  { server ws-server:3002; }

    # ── Redirect HTTP → HTTPS ───────────────────────────────────
    server {
        listen 80;
        server_name profundx.com;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name profundx.com;

        # SSL (provided via Let's Encrypt / Certbot)
        ssl_certificate     /etc/nginx/ssl/live/profundx.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/profundx.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ─────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: https://api.binance.com https://query1.finance.yahoo.com https://api.twelvedata.com https://api.coingecko.com https://o*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:; media-src 'none'; object-src 'none';" always;

        # ── Auth routes (strict rate limit) ──────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://api/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Trading routes ──────────────────────────────────────
        location /api/trading/ {
            limit_req zone=trading burst=10 nodelay;
            proxy_pass http://api/api/trading/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Admin routes ─────────────────────────────────────────
        location /api/admin/ {
            limit_req zone=admin burst=5 nodelay;
            proxy_pass http://api/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Health check (no rate limit) ────────────────────────
        location /health {
            proxy_pass http://api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Other API routes ────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── WebSocket ───────────────────────────────────────────
        location /ws {
            proxy_pass http://ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── Cache static assets (immutable) ────────────────────
        location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # ── SEO endpoints (proxied to API, not SPA) ────────────
        location = /sitemap.xml {
            proxy_pass http://api/sitemap.xml;
            proxy_set_header Host $host;
        }
        location = /robots.txt {
            proxy_pass http://api/robots.txt;
            proxy_set_header Host $host;
        }

        # ── Frontend SPA (React Router) ─────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Don't cache index.html — it's the entry point
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
